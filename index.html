<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ibadur Rahman Muslim Nexus | Islamic Knowledge Platform</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://js.paystack.co/v1/inline.js"></script>
</head>

<body>

<!-- OVERLAY -->
<div class="overlay" id="overlay"></div>

<!-- NAVBAR -->
<header class="navbar">
    <div class="logo">Ar-Rushdy</div>

    <div class="hamburger" id="hamburger">
        <span></span><span></span><span></span>
    </div>

    <nav id="navMenu">
        <a href="#home">Home</a>
        <a href="#hadith">Hadith</a>
        <a href="#quran">Qur’an</a>
        <a href="#dua">Dua</a>
        <a href="#dashboard">Dashboard</a>
    </nav>
</header>

<!-- HERO -->
<section class="hero" id="home">
    <h1>Strengthen Your Iman Through Knowledge</h1>
    <p>Daily Qur’an, Hadith & Dua reminders</p>
</section>

<!-- HADITH -->
<section class="section" id="hadith">
    <h2>📚 Hadith of the Day</h2>
    <div class="card" id="hadithBox">Loading...</div>
</section>

<!-- QURAN -->
<section class="section" id="quran">
    <h2>📖 Qur’an Verse</h2>
    <div class="card" id="quranBox">Loading...</div>
</section>

<!-- DUA -->
<section class="section" id="dua">
    <h2>🤲 Dua of the Day</h2>
    <div class="card" id="duaBox">Loading...</div>
</section>

<!-- DASHBOARD -->
<section class="section" id="dashboard">
    <h2>👤 Your Dashboard</h2>

    <input type="text" id="name" placeholder="Enter your name">
    <button onclick="saveName()">Save Name</button>

    <p id="welcome"></p>
</section>

<!-- PAYSTACK -->
<section class="section">
    <h2>Buy Book</h2>

    <input id="email" placeholder="Email">
    <input id="phone" placeholder="Phone">

    <button onclick="payWithPaystack()">Pay ₦5,000</button>
</section>

<script src="script.js"></script>
</body>
</html>
